name: CI
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: ./front
        run: npm ci

      - name: Run ESLint
        working-directory: ./front
        run: npm run lint

      - name: Build
        working-directory: ./front
        run: npm run build

      - name: Run Tests
        working-directory: ./front
        run: npm test
